name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  repository_dispatch:
    types: [build]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: "pnpm"

      - name: Enable corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clone private repo
        run: |
          git clone https://x-access-token:${{ secrets.PAT }}@github.com/PolarisNox/Obsidian-note.git temp_repo

      - name: Copy content
        run: |
          mkdir -p ./src/content/posts
          cp -r temp_repo/Blog/ ./src/content/posts/

      - name: Build
        run: pnpm build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist